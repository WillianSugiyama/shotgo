name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Build universal binary
        run: wails build -platform darwin/universal
      - name: Create DMG
        run: |
          hdiutil create -volname "ShotGo" \
            -srcfolder build/bin/ShotGo.app \
            -ov -format UDZO "build/bin/ShotGo-macOS-universal.dmg"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: build/bin/ShotGo-macOS-universal.dmg

  release-windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Install NSIS
        run: choco install nsis -y
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Build amd64
        run: wails build -platform windows/amd64 -nsis
      - name: Rename installer
        run: |
          Copy-Item "build\bin\shotgo-amd64-installer.exe" `
            "build\bin\ShotGo-Windows-x64-Setup.exe" -ErrorAction SilentlyContinue
          if (!(Test-Path "build\bin\ShotGo-Windows-x64-Setup.exe")) {
            Copy-Item "build\bin\shotgo.exe" "build\bin\ShotGo-Windows-x64.exe"
          }
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: build/bin/ShotGo-Windows-x64*.exe

  release-windows-arm64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Build arm64
        run: wails build -platform windows/arm64
      - name: Rename binary
        run: |
          Copy-Item "build\bin\shotgo.exe" "build\bin\ShotGo-Windows-arm64.exe"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm64
          path: build/bin/ShotGo-Windows-arm64.exe

  publish:
    needs: [release-macos, release-windows-amd64, release-windows-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List artifacts
        run: find artifacts -type f
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe

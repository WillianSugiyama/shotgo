name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Download ffmpeg
        run: bash scripts/download-ffmpeg.sh darwin
      - name: Prepare ffmpeg embed
        run: bash scripts/prepare-ffmpeg-embed.sh darwin
      - name: Build
        run: wails build -platform darwin/universal -tags embedffmpeg
      - name: Import certificate
        env:
          CERT_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERT_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "" build.keychain
          rm /tmp/cert.p12
      - name: Sign app
        run: |
          codesign --deep --force --verify --verbose \
            --sign "Developer ID Application: Willian Sugiyama (GHSUN7X4H6)" \
            --options runtime build/bin/ShotGo.app
      - name: Create DMG
        run: |
          hdiutil create -volname "ShotGo" \
            -srcfolder build/bin/ShotGo.app \
            -ov -format UDZO "build/bin/ShotGo-macOS-universal.dmg"
      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit "build/bin/ShotGo-macOS-universal.dmg" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" --wait
          xcrun stapler staple "build/bin/ShotGo-macOS-universal.dmg"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: build/bin/ShotGo-macOS-universal.dmg

  release-windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Download ffmpeg
        run: bash scripts/download-ffmpeg.sh windows
        shell: bash
      - name: Prepare ffmpeg embed
        run: bash scripts/prepare-ffmpeg-embed.sh windows
        shell: bash
      - name: Build
        run: wails build -platform windows/amd64 -tags embedffmpeg
      - name: Rename
        run: |
          Copy-Item "build\bin\shotgo.exe" "build\bin\ShotGo-Windows-x64.exe"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: build/bin/ShotGo-Windows-x64.exe

  release-windows-arm64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Download ffmpeg
        run: bash scripts/download-ffmpeg.sh windows
        shell: bash
      - name: Prepare ffmpeg embed
        run: bash scripts/prepare-ffmpeg-embed.sh windows
        shell: bash
      - name: Build
        run: wails build -platform windows/arm64 -tags embedffmpeg
      - name: Rename
        run: |
          Copy-Item "build\bin\shotgo.exe" "build\bin\ShotGo-Windows-arm64.exe"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm64
          path: build/bin/ShotGo-Windows-arm64.exe

  publish:
    needs: [release-macos, release-windows-amd64, release-windows-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
